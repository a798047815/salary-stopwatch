<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>赚钱秒表</title><style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  color: #ffffff;
  user-select: none;
  -webkit-user-select: none;
}

.container {
  padding: 20px;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
}

/* 工作时间卡片 */
.work-time-card {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 15px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  backdrop-filter: blur(10px);
}

.work-time-icon {
  font-size: 20px;
  margin-right: 8px;
}

.work-time-label {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.7);
  margin-right: 15px;
}

.work-time-value {
  font-size: 18px;
  font-weight: bold;
  color: #4CAF50;
}

/* 收入卡片 */
.earnings-card {
  background: linear-gradient(145deg, #2d4a3e 0%, #1a332a 100%);
  border-radius: 25px;
  padding: 40px 30px;
  text-align: center;
  margin-bottom: 20px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(76, 175, 80, 0.3);
}

.earnings-label {
  font-size: 16px;
  color: rgba(255, 255, 255, 0.7);
  margin-bottom: 15px;
}

.earnings-value {
  display: flex;
  align-items: baseline;
  justify-content: center;
  margin-bottom: 30px;
}

.currency {
  font-size: 28px;
  color: #4CAF50;
  margin-right: 8px;
}

.amount {
  font-size: 64px;
  font-weight: bold;
  color: #4CAF50;
  text-shadow: 0 0 30px rgba(76, 175, 80, 0.5);
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

.pulse {
  animation: pulse 1s ease-in-out infinite;
}

.work-timer {
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255, 255, 255, 0.6);
}

.timer-icon {
  font-size: 18px;
  margin-right: 8px;
}

.timer-value {
  font-size: 24px;
  font-family: 'Courier New', monospace;
  margin-right: 12px;
}

.timer-label {
  font-size: 14px;
}

/* 进度卡片 */
.progress-card {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 25px;
  margin-bottom: 20px;
}

.progress-info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 15px;
}

.remaining-time {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.8);
}

.expected-earnings {
  font-size: 14px;
  color: #FFC107;
}

.progress-bar-bg {
  height: 12px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 6px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #4CAF50, #8BC34A);
  border-radius: 6px;
  transition: width 0.5s ease;
}

.progress-text {
  display: block;
  text-align: right;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.6);
  margin-top: 8px;
}

/* 里程碑卡片 */
.milestone-card {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 25px;
  margin-bottom: 20px;
}

.milestone-title {
  display: flex;
  align-items: center;
  margin-bottom: 15px;
  color: rgba(255, 255, 255, 0.7);
  font-size: 14px;
}

.milestone-icon {
  font-size: 24px;
  margin-right: 10px;
}

.milestone-progress {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.milestone-amount {
  font-size: 28px;
  font-weight: bold;
  color: #FFC107;
}

.milestone-name {
  font-size: 16px;
  color: #FFC107;
  background: rgba(255, 193, 7, 0.2);
  padding: 6px 15px;
  border-radius: 20px;
}

/* 目标卡片 */
.goal-card {
  background: rgba(156, 39, 176, 0.2);
  border-radius: 20px;
  padding: 25px;
  margin-bottom: 20px;
  border: 1px solid rgba(156, 39, 176, 0.3);
}

.goal-title {
  display: flex;
  align-items: center;
  margin-bottom: 15px;
  color: rgba(255, 255, 255, 0.9);
  font-size: 16px;
  font-weight: bold;
}

.goal-icon {
  font-size: 24px;
  margin-right: 10px;
}

.goal-info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.goal-name {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.8);
}

.goal-percent {
  font-size: 14px;
  color: #9C27B0;
  font-weight: bold;
}

.goal-bar-bg {
  height: 10px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 5px;
  overflow: hidden;
  margin-bottom: 10px;
}

.goal-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #9C27B0, #E91E63);
  border-radius: 5px;
  transition: width 0.5s ease;
}

.goal-time {
  display: block;
  text-align: right;
  font-size: 12px;
  color: rgba(233, 30, 99, 0.8);
  font-weight: 500;
}

/* 工作推荐卡片 */
.jobs-card {
  background: rgba(33, 150, 243, 0.15);
  border-radius: 20px;
  padding: 25px;
  margin-bottom: 20px;
  border: 1px solid rgba(33, 150, 243, 0.3);
}

.jobs-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 15px;
  color: rgba(255, 255, 255, 0.9);
  font-size: 16px;
  font-weight: bold;
}

.jobs-title > div {
  display: flex;
  align-items: center;
}

.jobs-icon {
  font-size: 24px;
  margin-right: 10px;
}

.refresh-btn {
  padding: 6px 12px;
  border-radius: 15px;
  border: none;
  background: rgba(33, 150, 243, 0.4);
  color: white;
  font-size: 12px;
  cursor: pointer;
}

.refresh-btn:hover {
  background: rgba(33, 150, 243, 0.6);
}

.jobs-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.job-item {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  padding: 12px;
}

.job-title {
  font-size: 14px;
  font-weight: bold;
  color: white;
  margin-bottom: 5px;
}

.job-company {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.7);
  margin-bottom: 3px;
}

.job-salary {
  font-size: 13px;
  color: #2196F3;
  font-weight: bold;
}

/* 操作按钮 */
.action-buttons {
  margin-top: 20px;
  display: flex;
  gap: 10px;
}

.toggle-btn {
  flex: 1;
  padding: 18px;
  border-radius: 30px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.toggle-btn:active {
  transform: scale(0.98);
}

.toggle-btn.start {
  background: linear-gradient(90deg, #4CAF50, #8BC34A);
  color: white;
  box-shadow: 0 10px 30px rgba(76, 175, 80, 0.4);
}

.toggle-btn.stop {
  background: linear-gradient(90deg, #f44336, #e91e63);
  color: white;
  box-shadow: 0 10px 30px rgba(244, 67, 54, 0.4);
}

.settings-btn, .goal-btn {
  padding: 18px 16px;
  border-radius: 30px;
  font-size: 18px;
  border: none;
  background: rgba(255, 255, 255, 0.1);
  color: white;
  cursor: pointer;
  transition: all 0.2s ease;
}

.settings-btn:hover, .goal-btn:hover {
  background: rgba(255, 255, 255, 0.2);
}

/* 弹窗 */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(5px);
}

.modal.show {
  display: flex;
}

.modal-content {
  background: white;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  max-height: 80vh;
  overflow-y: auto;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  border-bottom: 1px solid #eee;
}

.modal-header h2 {
  color: #333;
  font-size: 20px;
}

.close-btn {
  font-size: 28px;
  color: #999;
  cursor: pointer;
  line-height: 1;
}

.modal-body {
  padding: 20px;
}

.setting-group {
  margin-bottom: 20px;
}

.setting-group label {
  display: block;
  color: #333;
  font-size: 14px;
  margin-bottom: 8px;
  font-weight: 500;
}

.setting-group input,
.setting-group select {
  width: 100%;
  padding: 12px 15px;
  border: 1px solid #ddd;
  border-radius: 10px;
  font-size: 16px;
  color: #333;
}

.input-group {
  display: flex;
  align-items: center;
  border: 1px solid #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.input-group span {
  padding: 12px 0 12px 15px;
  color: #4CAF50;
  font-size: 16px;
  font-weight: bold;
  background: #f5f5f5;
}

.input-group input {
  border: none;
  border-radius: 0;
  flex: 1;
}

.modal-footer {
  padding: 20px;
  border-top: 1px solid #eee;
}

.save-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(90deg, #4CAF50, #8BC34A);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

@media (max-width: 480px) {
  .container {
    padding: 15px;
  }
  
  .amount {
    font-size: 56px;
  }
  
  .action-buttons {
    margin-top: 20px;
  }
}</style></head><body>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>赚钱秒表</title>
</head>
<body>
  <div class="container">
    <!-- 顶部工作时间 -->
    <div class="work-time-card">
      <span class="work-time-icon">⏰</span>
      <span class="work-time-label">上班时间</span>
      <span class="work-time-value" id="workTimeValue">09:00 - 18:00</span>
    </div>

    <!-- 核心收入显示 -->
    <div class="earnings-card">
      <div class="earnings-label">今日收入</div>
      <div class="earnings-value">
        <span class="currency" id="currencySymbol">¥</span>
        <span class="amount pulse" id="currentEarnings">0.00</span>
      </div>
      <div class="work-timer">
        <span class="timer-icon">⏱</span>
        <span class="timer-value" id="workTime">00:00:00</span>
        <span class="timer-label">已工作</span>
      </div>
    </div>

    <!-- 进度条 -->
    <div class="progress-card">
      <div class="progress-info">
        <span class="remaining-time" id="remainingTime">距下班 8小时</span>
        <span class="expected-earnings" id="expectedEarnings">预计赚 ¥300</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
      </div>
      <span class="progress-text" id="progressText">0%</span>
    </div>

    <!-- 里程碑 -->
    <div class="milestone-card">
      <div class="milestone-title">
        <span class="milestone-icon" id="milestoneIcon">☕</span>
        <span>下一个目标</span>
      </div>
      <div class="milestone-progress">
        <span class="milestone-amount" id="milestoneAmount">¥30</span>
        <span class="milestone-name" id="milestoneName">咖啡自由</span>
      </div>
    </div>

    <!-- 目标卡片 -->
    <div class="goal-card">
      <div class="goal-title">
        <span class="goal-icon">🎯</span>
        <span>攒钱目标</span>
      </div>
      <div class="goal-progress" id="goalProgress">
        <div class="goal-info">
          <span class="goal-name" id="goalName">买房 (¥1,000,000)</span>
          <span class="goal-percent" id="goalPercent">0.01%</span>
        </div>
        <div class="goal-bar-bg">
          <div class="goal-bar-fill" id="goalBar" style="width: 0.01%"></div>
        </div>
        <span class="goal-time" id="goalTime">还需要 10 年 8 个月</span>
      </div>
    </div>

    <!-- 工作推荐 -->
    <div class="jobs-card">
      <div class="jobs-title">
        <span class="jobs-icon">💼</span>
        <span>高薪工作推荐</span>
        <button class="refresh-btn" onclick="loadJobs()">刷新</button>
      </div>
      <div class="jobs-list" id="jobsList">
        <!-- 工作列表会动态加载 -->
        <div class="job-item">
          <div class="job-title">加载中...</div>
        </div>
      </div>
    </div>

    <!-- 操作按钮 -->
    <div class="action-buttons">
      <button class="toggle-btn start" id="toggleBtn" onclick="toggleTimer()">▶️ 开始赚钱</button>
      <button class="settings-btn" onclick="openSettings()">⚙️ 设置</button>
      <button class="goal-btn" onclick="openGoalSettings()">🎯 目标</button>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal" id="settingsModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>设置</h2>
          <span class="close-btn" onclick="closeSettings()">×</span>
        </div>
        <div class="modal-body">
          <div class="setting-group">
            <label>每日工资</label>
            <div class="input-group">
              <span>¥</span>
              <input type="number" id="dailySalary" value="300" min="0">
            </div>
          </div>

          <div class="setting-group">
            <label>上班时间</label>
            <input type="time" id="workStartTime" value="09:00">
          </div>

          <div class="setting-group">
            <label>下班时间</label>
            <input type="time" id="workEndTime" value="18:00">
          </div>

          <div class="setting-group">
            <label>午休开始</label>
            <input type="time" id="breakStartTime" value="12:00">
          </div>

          <div class="setting-group">
            <label>午休时长（分钟）</label>
            <input type="number" id="breakDuration" value="60" min="0" max="120">
          </div>

          <div class="setting-group">
            <label>货币符号</label>
            <select id="currency">
              <option value="¥" selected>¥ 人民币</option>
              <option value="$">$ 美元</option>
              <option value="€">€ 欧元</option>
              <option value="£">£ 英镑</option>
            </select>
          </div>

          <div class="setting-group">
            <label>所在城市</label>
            <input type="text" id="city" placeholder="例如：北京" value="北京">
          </div>
          <div class="setting-group">
            <label>从事行业</label>
            <select id="industry">
              <option value="it">互联网/IT</option>
              <option value="finance">金融</option>
              <option value="education">教育</option>
              <option value="medical">医疗</option>
              <option value="design">设计</option>
              <option value="marketing">市场</option>
              <option value="others">其他</option>
            </select>
          </div>

          <div class="setting-group">
            <label>聚合数据API Key（可选）</label>
            <input type="text" id="jobsApiKey" placeholder="输入招聘API Key" value="">
          </div>
        </div>
        <div class="modal-footer">
          <button class="save-btn" onclick="saveSettings()">保存</button>
        </div>
      </div>
    </div>

    <!-- 目标设置弹窗 -->
    <div class="modal" id="goalModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>攒钱目标设置</h2>
          <span class="close-btn" onclick="closeGoalSettings()">×</span>
        </div>
        <div class="modal-body">
          <div class="setting-group">
            <label>目标名称</label>
            <input type="text" id="goalNameInput" placeholder="例如：买房、买车、旅游" value="买房">
          </div>
          <div class="setting-group">
            <label>目标金额</label>
            <div class="input-group">
              <span id="goalCurrency">¥</span>
              <input type="number" id="goalAmount" value="1000000" min="0">
            </div>
          </div>
          <div class="setting-group">
            <label>已攒金额</label>
            <div class="input-group">
              <span id="goalCurrencySaved">¥</span>
              <input type="number" id="goalSaved" value="1000" min="0">
            </div>
          </div>
          <div class="setting-group">
            <label>每月攒钱金额</label>
            <div class="input-group">
              <span id="goalCurrencyMonth">¥</span>
              <input type="number" id="goalMonthlySave" value="5000" min="0">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="save-btn" onclick="saveGoalSettings()">保存目标</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
<script>
// 全局配置
let config = {
  dailySalary: 300,
  workStartTime: '09:00',
  workEndTime: '18:00',
  breakStartTime: '12:00',
  breakDuration: 60,
  currency: '¥',
  city: '北京',
  industry: 'it'
}

// 攒钱目标配置
let goalConfig = {
  name: '买房',
  amount: 1000000,
  saved: 1000,
  monthlySave: 5000
}

// 全局状态
let state = {
  isRunning: false,
  currentEarnings: 0,
  timer: null,
  lastUpdateTime: null,
  lastDate: null,
  earningsPerSecond: 0,
  milestones: [
    { amount: 10, name: '开工红包', icon: '🧧' },
    { amount: 30, name: '咖啡自由', icon: '☕' },
    { amount: 50, name: '午餐达标', icon: '🍚' },
    { amount: 100, name: '下午茶', icon: '🍰' },
    { amount: 200, name: '下班自由', icon: '🎉' },
    { amount: 500, name: '日入五百', icon: '💪' },
    { amount: 1000, name: '日入千薪', icon: '🏆' }
  ]
}

// 初始化
function init() {
  loadConfig()
  loadGoalConfig()
  calculateEarningsPerSecond()
  updateUI()
  updateGoalUI()
  loadJobs()
  startTimer()
}

// 加载配置
function loadConfig() {
  const saved = localStorage.getItem('salaryConfig')
  if (saved) {
    config = { ...config, ...JSON.parse(saved) }
  }
  
  // 更新设置表单
  document.getElementById('dailySalary').value = config.dailySalary
  document.getElementById('workStartTime').value = config.workStartTime
  document.getElementById('workEndTime').value = config.workEndTime
  document.getElementById('breakStartTime').value = config.breakStartTime
  document.getElementById('breakDuration').value = config.breakDuration
  document.getElementById('currency').value = config.currency
  document.getElementById('city').value = config.city
  document.getElementById('industry').value = config.industry
  document.getElementById('jobsApiKey').value = localStorage.getItem('jobsApiKey') || ''
  
  // 更新显示
  document.getElementById('currencySymbol').textContent = config.currency
  document.getElementById('workTimeValue').textContent = `${config.workStartTime} - ${config.workEndTime}`
  document.getElementById('goalCurrency').textContent = config.currency
  document.getElementById('goalCurrencySaved').textContent = config.currency
  document.getElementById('goalCurrencyMonth').textContent = config.currency
}

// 加载目标配置
function loadGoalConfig() {
  const saved = localStorage.getItem('goalConfig')
  if (saved) {
    goalConfig = { ...goalConfig, ...JSON.parse(saved) }
  }
  
  document.getElementById('goalNameInput').value = goalConfig.name
  document.getElementById('goalAmount').value = goalConfig.amount
  document.getElementById('goalSaved').value = goalConfig.saved
  document.getElementById('goalMonthlySave').value = goalConfig.monthlySave
}

// 保存配置
function saveConfig() {
  localStorage.setItem('salaryConfig', JSON.stringify(config))
}

// 保存目标配置
function saveGoalConfig() {
  localStorage.setItem('goalConfig', JSON.stringify(goalConfig))
}

// 计算每秒收入
function calculateEarningsPerSecond() {
  const [startHour, startMin] = config.workStartTime.split(':').map(Number)
  const [endHour, endMin] = config.workEndTime.split(':').map(Number)
  
  let workSeconds = (endHour * 60 + endMin) - (startHour * 60 + startMin)
  workSeconds -= config.breakDuration || 0
  workSeconds *= 60
  
  if (workSeconds > 0) {
    state.earningsPerSecond = config.dailySalary / workSeconds
  }
}

// 启动计时器
function startTimer() {
  if (state.timer) return
  
  state.isRunning = true
  document.getElementById('toggleBtn').textContent = '⏸ 暂停'
  document.getElementById('toggleBtn').className = 'toggle-btn stop'
  
  state.timer = setInterval(() => {
    updateEarnings()
  }, 1000)
}

// 停止计时器
function stopTimer() {
  if (state.timer) {
    clearInterval(state.timer)
    state.timer = null
  }
  
  state.isRunning = false
  document.getElementById('toggleBtn').textContent = '▶️ 开始赚钱'
  document.getElementById('toggleBtn').className = 'toggle-btn start'
}

// 切换计时器
function toggleTimer() {
  if (state.isRunning) {
    stopTimer()
  } else {
    startTimer()
  }
}

// 更新收入
function updateEarnings() {
  const now = new Date()
  const currentTime = now.getTime()
  const today = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate()
  
  // 新的一天，重置收入
  if (!state.lastDate || state.lastDate !== today) {
    state.currentEarnings = 0
  }
  
  const currentHour = now.getHours()
  const currentMin = now.getMinutes()
  const currentSec = now.getSeconds()
  const currentMinutes = currentHour * 60 + currentMin
  const startMinutes = config.workStartTime.split(':').map(Number).reduce((h, m) => h * 60 + m, 0)
  const endMinutes = config.workEndTime.split(':').map(Number).reduce((h, m) => h * 60 + m, 0)
  
  // 午休时间
  const breakStartMinTotal = config.breakStartTime.split(':').map(Number).reduce((h, m) => h * 60 + m, 0)
  const breakEndMinTotal = breakStartMinTotal + config.breakDuration
  
  const inWorkTime = currentMinutes >= startMinutes && currentMinutes < endMinutes
  const inBreakTime = currentMinutes >= breakStartMinTotal && currentMinutes < breakEndMinTotal
  
  // 增加收入
  if (inWorkTime && !inBreakTime && state.isRunning) {
    if (state.lastUpdateTime) {
      const secondsPassed = Math.floor((currentTime - state.lastUpdateTime) / 1000)
      state.currentEarnings += state.earningsPerSecond * secondsPassed
    } else {
      // 计算今天已经工作的时间
      let secondsWorked = (currentMinutes - startMinutes) * 60 + currentSec
      if (currentMinutes > breakStartMinTotal) {
        secondsWorked -= config.breakDuration * 60
      }
      if (secondsWorked < 0) secondsWorked = 0
      state.currentEarnings = state.earningsPerSecond * secondsWorked
    }
  }
  
  // 更新UI
  updateUI()
  
  state.lastUpdateTime = currentTime
  state.lastDate = today
}

// 更新UI
function updateUI() {
  const now = new Date()
  const currentHour = now.getHours()
  const currentMin = now.getMinutes()
  const currentSec = now.getSeconds()
  const currentMinutes = currentHour * 60 + currentMin
  
  const startMinutes = config.workStartTime.split(':').map(Number).reduce((h, m) => h * 60 + m, 0)
  const endMinutes = config.workEndTime.split(':').map(Number).reduce((h, m) => h * 60 + m, 0)
  const breakStartMinTotal = config.breakStartTime.split(':').map(Number).reduce((h, m) => h * 60 + m, 0)
  const breakEndMinTotal = breakStartMinTotal + config.breakDuration
  
  // 计算进度
  let progressPercent = 0
  if (currentMinutes >= endMinutes) {
    progressPercent = 100
  } else {
    let totalWorkSeconds = (endMinutes - startMinutes) * 60 - config.breakDuration * 60
    let secondsWorked = (currentMinutes - startMinutes) * 60 + currentSec
    if (currentMinutes > breakStartMinTotal) {
      secondsWorked -= config.breakDuration * 60
    }
    if (secondsWorked > 0) {
      progressPercent = Math.min(100, (secondsWorked / totalWorkSeconds) * 100)
    }
  }
  
  // 距下班时间
  let remainingTime = ''
  let expectedEarnings = ''
  if (currentMinutes < endMinutes) {
    let remainingMinutes = endMinutes - currentMinutes
    if (currentMinutes < breakEndMinTotal && currentMinutes >= breakStartMinTotal) {
      remainingMinutes -= (breakEndMinTotal - currentMinutes)
    } else if (currentMinutes < breakStartMinTotal) {
      remainingMinutes -= config.breakDuration
    }
    remainingMinutes = Math.max(0, remainingMinutes)
    
    const hours = Math.floor(remainingMinutes / 60)
    const mins = Math.floor(remainingMinutes % 60)
    remainingTime = `距下班 ${hours}小时${mins}分钟`
    
    // 预计收入
    expectedEarnings = (remainingMinutes / 60 * config.dailySalary / ((endMinutes - startMinutes - config.breakDuration) / 60)).toFixed(0)
  } else {
    remainingTime = '已下班'
  }
  
  // 工作时长
  let workSeconds = 0
  const inWorkTime = currentMinutes >= startMinutes && currentMinutes < endMinutes
  const inBreakTime = currentMinutes >= breakStartMinTotal && currentMinutes < breakEndMinTotal
  
  if (inWorkTime && !inBreakTime) {
    let totalWorkSeconds = (endMinutes - startMinutes) * 60 - config.breakDuration * 60
    let secondsWorked = (currentMinutes - startMinutes) * 60 + currentSec
    if (currentMinutes > breakStartMinTotal) {
      secondsWorked -= config.breakDuration * 60
    }
    workSeconds = Math.max(0, secondsWorked)
  }
  
  const workHours = Math.floor(workSeconds / 3600)
  const workMins = Math.floor((workSeconds % 3600) / 60)
  const workSecs = workSeconds % 60
  
  // 下一个里程碑
  let nextMilestone = state.milestones.find(m => m.amount > state.currentEarnings)
  if (!nextMilestone) nextMilestone = { amount: '-', name: '已满级', icon: '🌟' }
  
  // 更新DOM
  document.getElementById('currentEarnings').textContent = state.currentEarnings.toFixed(2)
  document.getElementById('workTime').textContent = `${String(workHours).padStart(2, '0')}:${String(workMins).padStart(2, '0')}:${String(workSecs).padStart(2, '0')}`
  document.getElementById('remainingTime').textContent = remainingTime
  document.getElementById('expectedEarnings').textContent = expectedEarnings ? `预计赚 ${config.currency}${expectedEarnings}` : ''
  document.getElementById('progressBar').style.width = `${progressPercent.toFixed(0)}%`
  document.getElementById('progressText').textContent = `${progressPercent.toFixed(0)}%`
  document.getElementById('milestoneIcon').textContent = nextMilestone.icon
  document.getElementById('milestoneAmount').textContent = `${config.currency}${nextMilestone.amount}`
  document.getElementById('milestoneName').textContent = nextMilestone.name
}

// 更新目标UI
function updateGoalUI() {
  const percent = (goalConfig.saved / goalConfig.amount) * 100
  const remaining = goalConfig.amount - goalConfig.saved
  const monthsNeeded = remaining / goalConfig.monthlySave
  const years = Math.floor(monthsNeeded / 12)
  const months = Math.ceil(monthsNeeded % 12)
  
  let timeText = ''
  if (years > 0) {
    timeText += `${years}年`
  }
  if (months > 0) {
    timeText += `${months}个月`
  }
  if (years === 0 && months < 1) {
    timeText = '恭喜！目标即将达成'
  }
  
  document.getElementById('goalName').textContent = `${goalConfig.name} (${config.currency}${goalConfig.amount.toLocaleString()})`
  document.getElementById('goalPercent').textContent = `${percent.toFixed(2)}%`
  document.getElementById('goalBar').style.width = `${Math.min(100, percent)}%`
  document.getElementById('goalTime').textContent = `还需要 ${timeText}`
}

// 加载工作推荐
async function loadJobs() {
  const jobsList = document.getElementById('jobsList')
  jobsList.innerHTML = '<div class="job-item"><div class="job-title">加载中...</div></div>'
  
  try {
    // 优先用真实API，失败后用模拟数据
    let jobs = []
    
    // 尝试调用真实API（聚合数据招聘接口）
    const apiKey = localStorage.getItem('jobsApiKey')
    if (apiKey) {
      const response = await fetch(`https://apis.juhe.cn/jobs/search?key=${apiKey}&city=${encodeURIComponent(config.city)}&keyword=${encodeURIComponent(config.industry)}`, {
        mode: 'cors'
      })
      const data = await response.json()
      if (data && data.result && data.result.list) {
        jobs = data.result.list.map(item => ({
          title: item.job_name,
          company: item.company_name,
          salary: item.salary
        }))
      }
    }
    
    // API调用失败或没有数据，用模拟数据
    if (jobs.length === 0) {
      jobs = getMockJobs(config.city, config.industry)
    }
    
    let html = ''
    jobs.forEach(job => {
      html += `
        <div class="job-item">
          <div class="job-title">${job.title}</div>
          <div class="job-company">${job.company}</div>
          <div class="job-salary">${job.salary}</div>
        </div>
      `
    })
    
    jobsList.innerHTML = html
  } catch (e) {
    // API调用失败，降级使用模拟数据
    const mockJobs = getMockJobs(config.city, config.industry)
    let html = ''
    mockJobs.forEach(job => {
      html += `
        <div class="job-item">
          <div class="job-title">${job.title}</div>
          <div class="job-company">${job.company}</div>
          <div class="job-salary">${job.salary}</div>
        </div>
      `
    })
    jobsList.innerHTML = html
  }
}
