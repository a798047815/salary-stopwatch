name: 构建Android APK

on:
  push:
    branches: [ android-app ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 设置Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9477386
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: 安装Cordova
        run: npm install -g cordova@13.0.0

      - name: 进入Cordova项目
        run: cd salary-stopwatch-app

      - name: 安装依赖
        run: |
          cd salary-stopwatch-app
          npm install
          cordova plugin add cordova-plugin-broadcaster
          cordova plugin add ./cordova-plugin-widget

      - name: 构建调试APK
        run: |
          cd salary-stopwatch-app
          cordova build android --debug

      - name: 生成版本号
        id: version
        run: |
          echo "version=$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

      - name: 上传APK到Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0-${{ steps.version.outputs.version }}
          name: 赚钱秒表 v1.0.0 构建版
          body: |
            自动构建的Android APK安装包
            构建时间: ${{ github.event.head_commit.timestamp }}
            提交哈希: ${{ github.sha }}
          files: |
            salary-stopwatch-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}